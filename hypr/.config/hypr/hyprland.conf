#################################################################################################################
# Hyprland settings
#################################################################################################################

#################################################################################################################
# Monitor & Scaling 
#################################################################################################################
monitor=,1920x1080@144,auto,1.20
xwayland {
  force_zero_scaling = true
}

#################################################################################################################
# Set Default Programs & Quick Actions 
#################################################################################################################
$menu = wofi 
$browser = firefox
$terminal = kitty

$fileManager = $terminal -e yazi
$screensaver = $terminal -e cmatrix -sa -u 3 -C cyan

# Launches terminal with smaller font to fit btop better 
$taskManager = kitty -o "font_size=$(grep font_size ~/.config/kitty/kitty.conf | awk '{print $2-2}')" -e btop

$lockscreen = hyprlock
$colorpicker = hyprpicker -n -a
$notifications = swaync-client -t

$games = steam
$nitro_sense = DAMX
 
# Set Animated Wallpaper
# $wallpaper = mpvpaper -p -o "loop" ALL ~/Animated\ Wallpapers/MAGI_UI.mp4
$wallpaper = hyprpaper

# Reload GUI elements 
$reload_sway = pkill swaync; swaync
$reload_waybar = pkill waybar; waybar;
$reload_wallpaper = pkill $wallpaper; $wallpaper;

#################################################################################################################
# Autostart 
#################################################################################################################
exec-once = $wallpaper & waybar & swaync                  # Start wallpaper, status bar & notification daemon
exec-once = systemctl --user start hyprpolkitagent        # Start auth agent
exec-once = wl-paste --type text --watch cliphist store   # Copy text 
exec-once = wl-paste --type image --watch cliphist store  # Copy Images 

#################################################################################################################
# Enviroment Variables 
#################################################################################################################
env = XCURSOR_SIZE,26
env = HYPRCURSOR_SIZE,26

#################################################################################################################
# Look and Feel 
#################################################################################################################
general {
    # Layout options: dwindle, master, scrolling, monocle. 
    layout = scrolling     
    
    # Gaps
    gaps_in = 4
    gaps_out = 5
   
    # Borders
    border_size = 2
    col.active_border   = rgba(00f69bff) 
    col.inactive_border = rgba(595959aa)
    
    # Misc
    allow_tearing = false
    resize_on_border = true
}

decoration {
    rounding = 4
    rounding_power = 2
  
    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes, please :)
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# Layout
dwindle {
    pseudotile = true 
    preserve_split = true 
}
master {
    new_status = master
}
scrolling {
    direction = right #left/right/down/up
    column_width = 0.5
    fullscreen_on_one_column = true
    explicit_column_widths = 0.5, 1.0
}
misc {
    force_default_wallpaper = 0 
    disable_hyprland_logo = true 
}

#################################################################################################################
# Input 
#################################################################################################################
input {
    kb_layout = us
    repeat_rate = 35
    repeat_delay = 200
    
    sensitivity = 0 
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}
gesture = 3, horizontal, workspace

#################################################################################################################
# Keybidings 
#################################################################################################################
$mainMod = SUPER

# System Navigation 
bind = ALT,  SPACE, exec, $menu
bind = CTRL, SPACE, exec, $terminal
bind = $mainMod, Q, killactive,

# System Information
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, N, exec, $notifications
bind = SUPER+SHIFT, ESCAPE, exec, $taskManager

# Launch Programs
bind = $mainMod, B, exec, $browser
bind = $mainMod, G, exec, $games
bind = $mainMod, Z, exec, $nitro_sense  

# System Utilities
bind = $mainMod, P, exec, $colorpicker
bind = $mainMod, S, exec, $screensaver
bind = $mainMod, V, exec, cliphist list | wofi --dmenu --pre-display-cmd "echo '%s' | cut -f 2" | cliphist decode | wl-copy

# Load/Hide Status bar
bind = $mainMod,    W, exec, $reload_waybar
bind = SUPER+SHIFT, W, exec, pkill waybar

# Reload Wallpaper
bind = SUPER+SHIFT, B, exec, $reload_wallpaper

# Change Window Mode: Tiled, Floating, Fullscreen
bind = $mainMod,    F, fullscreen,
bind = $mainMod,    T, togglefloating,
bind = SUPER+SHIFT, T, exec, ~/.config/hypr/scripts/toggle-allfloat.sh 

# Rearrange tiled windows (scrolling)
bind = $mainMod,    K, layoutmsg, swapcol r
bind = $mainMod,    J, layoutmsg, swapcol l
bind = $mainMod,    H, layoutmsg, colresize +conf

# Session binds (logout & exit hyprland)
bind = $mainMod,    L, exec, $lockscreen
bind = $mainMod,    M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# Move focus with Super + arrow keys
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Switch workspaces with Super + [0-5]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move active window to a workspace with Super + CTRL + [0-5]
bind = $mainMod CTRL, 1, movetoworkspace, 1
bind = $mainMod CTRL, 2, movetoworkspace, 2
bind = $mainMod CTRL, 3, movetoworkspace, 3
bind = $mainMod CTRL, 4, movetoworkspace, 4
bind = $mainMod CTRL, 5, movetoworkspace, 5

# Move active window to a workspace with Super + SHIFT + [0-5]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5

# Move through existing workspaces
bind = CTRL + SUPER, left,  workspace, e-1
bind = CTRL + SUPER, right, workspace, e+1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Play/Pause, Fowards and Reverse media using the media keys
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

#################################################################################################################
# WINDOWS AND WORKSPACES 
#################################################################################################################
## GENERAL 
# Fix some dragging issues with XWayland
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

## APP SPECIFIC SETTINGS
# Launch steam settings in floating mode but in a smaller window
windowrule {
    name = steam-settings
    match:class = steam
    match:title = Steam Settings
    float = yes
    center = yes
    size = 850 730
}

# Launch steam games in fullscreen 
windowrule {
    name = steam-game
    match:class = steam_app_.* 
    fullscreen = yes
}

# Launch Nitro Sense Manager floating
windowrule {
    name = Nitro-run
    match:class = DivAcerManagerMax
    float = yes
    center = yes
}

# Make workspaces 1-4 persistent 
workspace = 1, persistent:true
workspace = 2, persistent:true
workspace = 3, persistent:true
workspace = 4, persistent:true


