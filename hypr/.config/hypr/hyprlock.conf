###########################################################################################################################################
# Levy's Hyprlock
###########################################################################################################################################
# Look and Feel
$font = Monospace
general {
    hide_cursor = false
    fail_timeout = 2000
    ignore_empty_input = true
}
animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}
background {
    monitor =
    path = ~/Pictures/cool_anime_girl1.jpg
    blur_passes = 0
}

# Input 
input-field {
    monitor =
    size = 25%, 5%
    outline_thickness = 2

    inner_color = rgba(00000000) 
    outer_color = rgba(ad4222ff)
    check_color = rgba(ff6633ee) 
    fail_color  = rgba(b00407ff) 

    font_color = rgb(615f60)
    fade_on_empty = false
    rounding = 8

    font_family = $font
    fail_text = $PAMFAIL
    check_text = Authenticating...
    placeholder_text = Enter password...

    # dots_text_format = *
    # dots_size = 0.4
    dots_spacing = 0.3

    hide_input = false

    position = 0, -120
    halign = center
    valign = center
}

# Time 
label {
    monitor =
    text = $TIME12 
    
    color = rgb(c5cece)
    font_size = 90
    font_family = $font

    position = 0, 430
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y" 

    color = rgb(c5cece)
    font_size = 25
    font_family = $font

    position = 0, 350 
    halign = center
    valign = center
}

# User Info
label {
    monitor =
    text = Welcome back $USER!  
    
    color = rgb(ad4322)
    font_size = 20
    font_family = $font

    position = 0, -60 
    halign = center
    valign = center
}

